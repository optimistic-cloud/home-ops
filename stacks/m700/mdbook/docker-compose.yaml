name: mdbook

services:
  mdbook:
    container_name: mdbook
    image: peaceiris/mdbook:v0.5.0@sha256:3d599ba3e1963fb83d192f0a5671ecb2c22e023be1e78d981c19109825d9b467
    restart: unless-stopped
    user: "1000:1000"
    stdin_open: true
    tty: true
    expose:
      - 3000
      - 3001
    volumes:
      - ./mdbook-data:/book
    environment:
      TZ: Europe/Berlin
    command:
      - serve
      - --hostname
      - '0.0.0.0'
    networks:
      - m700_default

networks:
  m700_default:
    external: true
