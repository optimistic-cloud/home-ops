name: lldap

volumes:
  lldap-data:
    name: lldap-data

networks:
  m700_default:
    external: true
  default:

services:

  certbot:
    container_name: lldap-certbot
    image: certbot/dns-cloudflare:latest@sha256:f90db06a98b61bd221fe5a9688d0bb975b444760ef677cb4369ffc2a8a16e579
    command: >-
      certonly
        --non-interactive
        --agree-tos
        --email ${EMAIL}
        --dns-cloudflare
        --dns-cloudflare-credentials "/run/secrets/cloudflare_token"
        --dns-cloudflare-propagation-seconds 60
        -d "ldap.optimistic.cloud"
    volumes:
      - ./etc/letsencrypt:/etc/letsencrypt
      - ./certbot/data:/var/www/certbot
    secrets:
      - cloudflare_token
    restart: "no"

  lldap:
    image: lldap/lldap:stable@sha256:2a8454b668c1aba7157e832eab0e242e1e7eb5fb7591d7e7774ba05286511ca8
    container_name: lldap
    restart: unless-stopped
    networks:
      - m700_default
      - default
    # expose:
    #   - "17170"
    #   - 6360:6360
    ports:
      - "127.0.0.1:17170:17170"
      - "636:6360"
    env_file: .env
    volumes:
      - "lldap-data:/data"
      - ./etc/letsencrypt:/etc/letsencrypt
    environment:
      UID: 1000
      GID: 1000
      TZ: Europe/Berlin
      LLDAP_VERBOSE: false

      LLDAP_JWT_SECRET_FILE: /run/secrets/jwt
      LLDAP_KEY_SEED_FILE: /run/secrets/key_seed

      LLDAP_LDAPS_OPTIONS__ENABLED: true
      LLDAP_LDAPS_OPTIONS__CERT_FILE: /etc/letsencrypt/live/ldap.optimistic.cloud/fullchain.pem
      LLDAP_LDAPS_OPTIONS__KEY_FILE: /etc/letsencrypt/live/ldap.optimistic.cloud/privkey.pem
    secrets:
      - jwt
      - key_seed

secrets:
  jwt:
    file: jwt.txt
  key_seed:
    file: key_seed.txt
  cloudflare_token:
    file: cloudflare.ini
