name: gitea-backup-restic-local

services:
  restic:
    image: restic/restic:0.18.1@sha256:39d9072fb5651c80d75c7a811612eb60b4c06b32ffe87c2e9f3c7222e1797e76
    hostname: m700
    restart: "no"
    stdin_open: true
    user: "0:0"
    environment:
      TZ: Europe/Berlin
      RESTIC_REPOSITORY: /repo
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      RESTIC_CACHE_DIR: /root/.cache/restic
    volumes:
      - restic-cache:/root/.cache/restic
      - /mnt/data/m700/gitea:/repo
    secrets:
      - restic_password

secrets:
  restic_password:
    file: local.restic.password

volumes:
  restic-cache:
    name: restic-cache
    external: true
