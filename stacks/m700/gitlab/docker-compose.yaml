name: gitlab

services:
  # Deployment notes
  # 1. Create external volumes before first run:
  #      docker volume create m700_gitlab-config
  #      docker volume create m700_gitlab-logs
  #      docker volume create m700_gitlab-data
  #      docker network create gitlab_default
  # 2. Start the stack: docker compose up -d
  # 3. GitLab takes ~5 min to become healthy on first boot
  # 4. Register the runner after GitLab is up:
  #      docker compose exec runner gitlab-runner register \
  #        --non-interactive \
  #        --url "http://gitlab:80" \
  #        --token "<glrt-token from Admin > CI/CD > Runners>" \
  #        --executor "docker" \
  #        --docker-image "docker:latest" \
  #        --docker-volumes "/var/run/docker.sock:/var/run/docker.sock" \
  #        --name "m700"

  gitlab:
    image: docker.io/gitlab/gitlab-ce:19.0.1-ce.0@sha256:c7082004a0f64123634fda345e849453d52956621893bed7d2218fa6f088247f
    container_name: gitlab
    restart: unless-stopped
    expose:
      - "80"
    environment:
      TZ: Europe/Berlin
      GITLAB_ROOT_PASSWORD: "${GITLAB_ROOT_PASSWORD}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      GITLAB_SMTP_USER: "${GITLAB_SMTP_USER}"
      GITLAB_SMTP_PASSWORD: "${GITLAB_SMTP_PASSWORD}"
      GITLAB_SMTP_FROM: "${GITLAB_SMTP_FROM}"
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.${DOMAIN}'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['redirect_http_to_https'] = false

        gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
        gitlab_rails['display_initial_root_password'] = false

        gitlab_rails['smtp_enable'] = true
        gitlab_rails['smtp_address'] = ENV['SMTP_HOST']
        gitlab_rails['smtp_port'] = ENV['SMTP_PORT'].to_i
        gitlab_rails['smtp_user_name'] = ENV['GITLAB_SMTP_USER']
        gitlab_rails['smtp_password'] = ENV['GITLAB_SMTP_PASSWORD']
        gitlab_rails['smtp_from_address'] = ENV['GITLAB_SMTP_FROM']

        gitlab_rails['time_zone'] = 'Europe/Berlin'
        gitlab_rails['usage_ping_enabled'] = false
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false

        gitlab_rails['omniauth_enabled'] = true
        gitlab_rails['omniauth_allow_single_sign_on'] = ['openid_connect']
        gitlab_rails['omniauth_block_auto_created_users'] = false
        gitlab_rails['omniauth_providers'] = [
          {
            name: "openid_connect",
            label: "Pocket ID",
            args: {
              name: "openid_connect",
              scope: ["openid", "profile", "email"],
              response_type: "code",
              issuer: "https://id.optimistic.cloud",
              discovery: true,
              client_auth_method: "query",
              uid_field: "preferred_username",
              client_options: {
                identifier: "YOUR_CLIENT_ID",
                secret: "YOUR_CLIENT_SECRET",
                redirect_uri: "https://gitlab.optimistic.cloud/users/auth/openid_connect/callback"
              }
            }
          }
        ]
    volumes:
      - m700_gitlab-config:/etc/gitlab
      - m700_gitlab-logs:/var/log/gitlab
      - m700_gitlab-data:/var/opt/gitlab
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/-/health"]
      interval: 180s
      timeout: 30s
      retries: 5
      start_period: 360s
    networks:
      - m700_default
      - gitlab_default

  runner:
    image: docker.io/gitlab/gitlab-runner:v19.0.1@sha256:4b09c6507100f3f9cad1ca986f4ed3eeafac1ffaf5eba6db694663f33ed83e57
    container_name: gitlab-runner
    restart: unless-stopped
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - runner-data:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitlab_default

volumes:
  m700_gitlab-config:
  m700_gitlab-logs:
  m700_gitlab-data:
  runner-data:

networks:
  m700_default:
    external: true
  gitlab_default:
