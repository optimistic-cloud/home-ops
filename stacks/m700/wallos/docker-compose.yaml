name: wallos

services:
  wallos:
    container_name: wallos
    image: bellamy/wallos:4.9.5@sha256:11ed4975912a014e2ec53d5270acfdde8eb928f59b56ad9ba136a2e69bbec019
    expose:
      - "80"
    environment:
      TZ: 'Europe/Berlin'
    volumes:
      - wallos-data:/var/www/html
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 180s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - m700_default

volumes:
  wallos-data:
    name: wallos-data
    external: true

networks:
  m700_default:
    external: true