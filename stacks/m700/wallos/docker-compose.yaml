name: wallos

services:
  wallos:
    container_name: wallos
    image: bellamy/wallos:4.7.3@sha256:e558da4263cc7406745c0859d28bacec6cca7ac749209eff363ab66c7458252b
    expose:
      - "80"
    environment:
      TZ: 'Europe/Berlin'
    volumes:
      - wallos-data:/var/www/html
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 180s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - m700_default

volumes:
  wallos-data:
    name: wallos-data
    external: true

networks:
  m700_default:
    external: true