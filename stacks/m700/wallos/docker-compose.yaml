name: wallos

services:
  wallos:
    container_name: wallos
    image: bellamy/wallos:4.9.3@sha256:5e6f10fe495e78bcd3c92db572923ed23d16f5c62d8721e8664faa7119e798f5
    expose:
      - "80"
    environment:
      TZ: 'Europe/Berlin'
    volumes:
      - wallos-data:/var/www/html
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 180s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - m700_default

volumes:
  wallos-data:
    name: wallos-data
    external: true

networks:
  m700_default:
    external: true